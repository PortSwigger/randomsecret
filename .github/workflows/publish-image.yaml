name: Publish Docker image

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: public.ecr.aws/q3z6g1h3/randomsecret

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            output_name: digest_amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            output_name: digest_arm64

    runs-on: ${{ matrix.runner }}

    outputs:
      digest_amd64: ${{ steps.export.outputs.digest_amd64 }}
      digest_arm64: ${{ steps.export.outputs.digest_arm64 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::436027055282:role/product-roles/randomsecret-ecr-publish
          aws-region: us-east-1

      - name: Log in to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        id: export
        run: |
          echo "${{ matrix.output_name }}=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  merge:
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::436027055282:role/product-roles/randomsecret-ecr-publish
          aws-region: us-east-1

      - name: Log in to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push manifest list
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${{ github.ref_name }}" \
            "${IMAGE}@${{ needs.build.outputs.digest_amd64 }}" \
            "${IMAGE}@${{ needs.build.outputs.digest_arm64 }}"
