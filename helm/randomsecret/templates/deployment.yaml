apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "randomsecret.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "randomsecret.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "randomsecret.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "randomsecret.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "randomsecret.fullname" . }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: randomsecret
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
